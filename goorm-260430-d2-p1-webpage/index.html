<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>차트 해설 AI | 바이브코딩 입문자용</title>
    <meta
      name="description"
      content="주식 차트 이미지를 업로드하면 초보자 친화적으로 차트 구조와 시장 상태를 설명해주는 AI 웹앱 MVP"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">Vibe Coding Day 2</p>
        <h1>주식 차트 해설 AI</h1>
        <p class="hero-copy">
          차트 이미지를 올리면 AI가 차트 구조를 읽고, 현재 시장 흐름과 초보자 관점의 인사이트를
          설명합니다.
        </p>
      </header>

      <section class="card upload-card">
        <div
          id="drop-zone"
          class="drop-zone"
          tabindex="0"
          role="button"
          aria-label="이미지 선택 또는 드롭"
        >
          <span class="drop-zone-hint" id="drop-zone-hint">이미지를 놓거나 클릭하여 선택 · PNG / JPG / WEBP</span>
        </div>
        <input id="image-input" type="file" accept="image/png,image/jpeg,image/webp" hidden />

        <div id="preview-panel" class="preview-panel is-hidden" aria-label="선택한 차트 미리보기">
          <div class="preview-toolbar">
            <div class="preview-toolbar-cell">
              <div class="preview-toolbar-zoom toolbar-group" role="group" aria-label="확대·축소">
                <button type="button" id="zoom-out" class="tool-btn tool-icon-btn" title="축소" aria-label="축소">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <button type="button" id="zoom-reset" class="tool-btn tool-icon-btn" title="뷰 맞춤" aria-label="뷰 맞춤">
                  <!-- Material fit_screen: 프레임에 맞춤 -->
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M17 4h3c1.1 0 2 .9 2 2v2h-2V6h-3V4zM4 8V6h3V4H4c-1.1 0-2 .9-2 2v2h2zm16 8v2h-3v2h3c1.1 0 2-.9 2-2v-2h-2zM7 18H4v-2H2v2c0 1.1.9 2 2 2h3v-2z"
                    />
                  </svg>
                </button>
                <button type="button" id="zoom-in" class="tool-btn tool-icon-btn" title="확대" aria-label="확대">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
              </div>
            </div>
            <div class="preview-toolbar-spacer" aria-hidden="true"></div>
            <div class="preview-toolbar-cell">
              <div class="preview-toolbar-draw toolbar-group" role="group" aria-label="이동·그리기">
                <button type="button" id="tool-pan" class="tool-btn tool-icon-btn is-active" title="이동" aria-label="이동" aria-pressed="true">
                  <!-- Material open_with: 팬/이동 -->
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      fill="currentColor"
                      d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"
                    />
                  </svg>
                </button>
                <button type="button" id="tool-text" class="tool-btn tool-icon-btn" title="글자" aria-label="글자" aria-pressed="false">
                  <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="none">
                    <rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.85" />
                    <path fill="currentColor" d="M9.75 8.5h4.5v1.65h-1.42v5.35h-1.65v-5.35H9.75V8.5z" />
                  </svg>
                </button>
                <button type="button" id="tool-erase" class="tool-btn tool-icon-btn" title="지우기" aria-label="지우기" aria-pressed="false">
                  <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                  </svg>
                </button>
                <button type="button" id="tool-pen" class="tool-btn tool-icon-btn" title="펜" aria-label="펜" aria-pressed="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button type="button" id="tool-line" class="tool-btn tool-icon-btn" title="직선" aria-label="직선" aria-pressed="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 21l18-18-1.41-1.41L1.59 19.59z"/></svg>
                </button>
                <button type="button" id="tool-rect" class="tool-btn tool-icon-btn" title="사각형" aria-label="사각형" aria-pressed="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M3 3v18h18V3H3zm16 16H5V5h14v14z"/></svg>
                </button>
                <button type="button" id="tool-ellipse" class="tool-btn tool-icon-btn" title="원/타원" aria-label="원 또는 타원" aria-pressed="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
                </button>
                <input id="color-input" type="color" value="#3b82f6" class="visually-hidden" aria-label="선 색상" />
                <button type="button" id="color-btn" class="tool-btn tool-icon-btn tool-color-btn" title="색상" aria-label="색상 선택">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                </button>
              </div>
            </div>
            <div class="preview-toolbar-spacer" aria-hidden="true"></div>
            <div class="preview-toolbar-cell">
              <div
                class="preview-toolbar-history toolbar-group"
                role="group"
                aria-label="실행 취소·다시 실행·그림 초기화"
              >
                <button type="button" id="tool-undo" class="tool-btn tool-icon-btn" title="실행 취소" aria-label="실행 취소" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
                  </svg>
                </button>
                <button type="button" id="tool-redo" class="tool-btn tool-icon-btn" title="다시 실행" aria-label="다시 실행" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22l1.54 1.54c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/>
                  </svg>
                </button>
                <button
                  type="button"
                  id="tool-reset-drawing"
                  class="tool-btn tool-icon-btn"
                  title="초기화"
                  aria-label="그림 초기화"
                  disabled
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="preview-toolbar-spacer" aria-hidden="true"></div>
            <div class="preview-toolbar-cell">
              <div class="preview-toolbar-download toolbar-group" role="group" aria-label="이미지 저장">
                <button type="button" id="tool-download" class="tool-btn tool-icon-btn" title="이미지+그림 저장" aria-label="다운로드">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div id="preview-viewport" class="preview-viewport">
            <div id="preview-stage" class="preview-stage">
              <div id="preview-media" class="preview-media">
                <img id="preview-image" alt="선택한 차트" draggable="false" />
                <canvas id="draw-canvas" class="draw-canvas" aria-label="그리기 레이어"></canvas>
              </div>
            </div>
          </div>
        </div>

        <button id="analyze-button" class="analyze-button" type="button">분석하기</button>
      </section>

      <section id="result-card" class="card result-card is-hidden" aria-labelledby="result-title">
        <div class="section-head">
          <h2 id="result-title">분석 결과</h2>
          <span id="market-badge" class="market-badge">상태 대기</span>
        </div>

        <article class="result-block">
          <h3>차트 요약</h3>
          <p id="summary-text"></p>
        </article>

        <article class="result-block">
          <h3>시장 상태 해석</h3>
          <p id="trend-text"></p>
        </article>

        <article class="result-block">
          <h3>초보자 인사이트</h3>
          <p id="insight-text"></p>
        </article>

        <article class="result-block">
          <h3>감지된 요소</h3>
          <ul id="detected-list" class="tag-list"></ul>
        </article>

        <article class="result-block">
          <h3>주의할 점</h3>
          <ul id="caution-list" class="caution-list"></ul>
        </article>
      </section>
    </main>

    <div id="error-modal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="error-modal-title">
      <div class="modal-backdrop" id="error-modal-backdrop"></div>
      <div class="modal-box">
        <h3 id="error-modal-title" class="modal-title">알림</h3>
        <p id="error-modal-text" class="modal-text"></p>
        <button type="button" id="error-modal-close" class="modal-close">확인</button>
      </div>
    </div>

    <div
      id="text-entry-modal"
      class="modal modal--text-entry is-hidden"
      role="dialog"
      aria-modal="true"
      aria-label="글자 입력"
    >
      <div class="modal-backdrop" id="text-entry-modal-backdrop"></div>
      <div class="modal-box modal-box--text-entry">
        <input
          id="text-entry-input"
          type="text"
          class="text-entry-input"
          maxlength="200"
          autocomplete="off"
          aria-label="표시할 글자"
        />
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
