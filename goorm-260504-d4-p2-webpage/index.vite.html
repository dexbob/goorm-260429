<!doctype html>
<html lang="ko">
  <head>

    <title>한국 명언 카드</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,500;0,7..72,600;1,7..72,500&family=Noto+Serif+KR:wght@400;500;600;700&display=swap"

    <div class="page-bg" aria-hidden="true"></div>
    <div id="root">
      <div class="boot-fallback">
        <p><strong>로딩 중…</strong></p>
        <p>
          이 안내가 사라지지 않으면 브라우저가 번들을 실행하지 못한 것입니다. 루트 정적 허브(한 포트만 노출하는
          Tailscale funnel 등)에서는 이 폴더의 <code>index.html</code>이 <code>npm run build</code>로
          갱신된 뒤여야 합니다.
        </p>
        <p>
          로컬에서 HMR·API를 쓸 때는 <code>npm run dev</code> 또는
          <code>./start-servers.sh</code> 가 안내하는 <strong>Node 포트</strong>로 열면 됩니다.
        </p>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
